# Stack unificada: n8n + Evolution API + PostgreSQL + Redis
# Todos na mesma rede para comunicacao interna via nome de servico.
# Variaveis sensiveis ficam no arquivo .env (nao commitar).

services:

  # --- n8n ---
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_RESTRICT_FILE_ACCESS_TO: /data/saida;/home/node/.n8n-files

      N8N_GOOGLE_OAUTH_REDIRECT_URI: ${N8N_GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:5678/rest/oauth2-credential/callback}

      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LEADS_SHEET_ID: ${LEADS_SHEET_ID}
      LEADS_SHEET_NAME: ${LEADS_SHEET_NAME:-Leads}
      LEADS_LOG_SHEET_NAME: ${LEADS_LOG_SHEET_NAME:-envios_log}
      LEADS_ERROR_SHEET_NAME: ${LEADS_ERROR_SHEET_NAME:-envios_erros}

      EVOLUTION_BASE_URL: http://evolution_api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-hogar_evolution_key_2026}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}

      CONTACTS_CSV_PATH: ${CONTACTS_CSV_PATH:-/home/node/.n8n-files/planilha_mestre_segmentada_nobom.csv}
      CAMPAIGN_SEND_LOCK: ${CAMPAIGN_SEND_LOCK:-true}
      CAMPAIGN_DRY_RUN: ${CAMPAIGN_DRY_RUN:-true}
      CAMPAIGN_FORCE_PHONE: ${CAMPAIGN_FORCE_PHONE:-}
      CAMPAIGN_MAX_CONTACTS: ${CAMPAIGN_MAX_CONTACTS:-20}
      CAMPAIGN_START_HOUR: ${CAMPAIGN_START_HOUR:-9}
      CAMPAIGN_END_HOUR: ${CAMPAIGN_END_HOUR:-17}
      CAMPAIGN_TIMEZONE: ${CAMPAIGN_TIMEZONE:-America/Sao_Paulo}

      CAMPAIGN_AUDIENCE: ${CAMPAIGN_AUDIENCE:-parceiros}
      CAMPAIGN_GROUP_FILTER: ${CAMPAIGN_GROUP_FILTER:-}
      CAMPAIGN_OWNER_FILTER: ${CAMPAIGN_OWNER_FILTER:-}
      CAMPAIGN_SKIP_ADMINS: ${CAMPAIGN_SKIP_ADMINS:-true}
      CAMPAIGN_ALLOW_NON_BR: ${CAMPAIGN_ALLOW_NON_BR:-false}
      CAMPAIGN_VALIDATION_MODE: ${CAMPAIGN_VALIDATION_MODE:-name_group}
      CAMPAIGN_TARGET_NAME: ${CAMPAIGN_TARGET_NAME:-}
      CAMPAIGN_TARGET_GROUP: ${CAMPAIGN_TARGET_GROUP:-}

      CAMPAIGN_ID: ${CAMPAIGN_ID:-campanha_teste}
      CAMPAIGN_STATUS_COLUMN: ${CAMPAIGN_STATUS_COLUMN:-status_campanha}
      CAMPAIGN_STATUS_ID_COLUMN: ${CAMPAIGN_STATUS_ID_COLUMN:-campanha_status_id}
      CAMPAIGN_STATUS_SCOPE: ${CAMPAIGN_STATUS_SCOPE:-campaign}
      CAMPAIGN_STATUS_FILTER: ${CAMPAIGN_STATUS_FILTER:-nao_enviado}

      CAMPAIGN_TEMPLATE_FOCUS: ${CAMPAIGN_TEMPLATE_FOCUS:-imoveis de luxo}
      CAMPAIGN_TEMPLATE_MODE: ${CAMPAIGN_TEMPLATE_MODE:-hogar}
      CAMPAIGN_USE_AT_MENTION: ${CAMPAIGN_USE_AT_MENTION:-false}
      CAMPAIGN_GREETING_STRATEGY: ${CAMPAIGN_GREETING_STRATEGY:-rotativo}
      CAMPAIGN_TICKET_DEFAULT: ${CAMPAIGN_TICKET_DEFAULT:-premium}
      CAMPAIGN_OWNER_HINTS_RHUAN: ${CAMPAIGN_OWNER_HINTS_RHUAN:-}
      CAMPAIGN_OWNER_HINTS_HUGO: ${CAMPAIGN_OWNER_HINTS_HUGO:-}

      CAMPAIGN_DELAY_MIN_SECONDS: ${CAMPAIGN_DELAY_MIN_SECONDS:-25}
      CAMPAIGN_DELAY_MAX_SECONDS: ${CAMPAIGN_DELAY_MAX_SECONDS:-45}
      CAMPAIGN_DELAY_PROFILE: ${CAMPAIGN_DELAY_PROFILE:-25-45|30-55|35-60}
      CAMPAIGN_DELAY_SWITCH_EVERY: ${CAMPAIGN_DELAY_SWITCH_EVERY:-8}
      CAMPAIGN_LONG_BREAK_ENABLED: ${CAMPAIGN_LONG_BREAK_ENABLED:-true}
      CAMPAIGN_LONG_BREAK_EVERY_MIN: ${CAMPAIGN_LONG_BREAK_EVERY_MIN:-20}
      CAMPAIGN_LONG_BREAK_EVERY_MAX: ${CAMPAIGN_LONG_BREAK_EVERY_MAX:-30}
      CAMPAIGN_LONG_BREAK_MIN_SECONDS: ${CAMPAIGN_LONG_BREAK_MIN_SECONDS:-300}
      CAMPAIGN_LONG_BREAK_MAX_SECONDS: ${CAMPAIGN_LONG_BREAK_MAX_SECONDS:-720}

      CAMPAIGN_TYPING_ENABLED: ${CAMPAIGN_TYPING_ENABLED:-true}
      CAMPAIGN_TYPING_PRESENCE: ${CAMPAIGN_TYPING_PRESENCE:-composing}
      CAMPAIGN_TYPING_MIN_MS: ${CAMPAIGN_TYPING_MIN_MS:-1200}
      CAMPAIGN_TYPING_MAX_MS: ${CAMPAIGN_TYPING_MAX_MS:-4200}
      CAMPAIGN_TYPING_MS_PER_CHAR: ${CAMPAIGN_TYPING_MS_PER_CHAR:-28}

      CAMPAIGN_KILL_SWITCH_ERRORS: ${CAMPAIGN_KILL_SWITCH_ERRORS:-3}
      CAMPAIGN_ALERT_PHONE: ${CAMPAIGN_ALERT_PHONE:-}
      CAMPAIGN_RAMP_ENABLED: ${CAMPAIGN_RAMP_ENABLED:-true}
      CAMPAIGN_RAMP_DAY: ${CAMPAIGN_RAMP_DAY:-1}
      CAMPAIGN_RAMP_PROFILE: ${CAMPAIGN_RAMP_PROFILE:-40|80|150|250|400|600}

      INBOUND_WEBHOOK_PATH: ${INBOUND_WEBHOOK_PATH:-evolution/inbound}
      INBOUND_WEBHOOK_SECRET: ${INBOUND_WEBHOOK_SECRET:-}
      INBOUND_DEDUPE_TTL_SECONDS: ${INBOUND_DEDUPE_TTL_SECONDS:-172800}
      INBOUND_DEDUPE_TEXT_WINDOW_SECONDS: ${INBOUND_DEDUPE_TEXT_WINDOW_SECONDS:-600}
      INBOUND_DEDUPE_MAX_KEYS: ${INBOUND_DEDUPE_MAX_KEYS:-50000}
      INBOUND_BLOCK_ON_NEGATIVE: ${INBOUND_BLOCK_ON_NEGATIVE:-true}
      INBOUND_BLOCK_ON_POSITIVE: ${INBOUND_BLOCK_ON_POSITIVE:-false}
      INBOUND_LOG_SHEET_NAME: ${INBOUND_LOG_SHEET_NAME:-inbound_log}
      INBOUND_ORPHAN_SHEET_NAME: ${INBOUND_ORPHAN_SHEET_NAME:-inbound_orfaos}

    volumes:
      - n8n_data:/home/node/.n8n
      - ./saida:/data/saida:ro
    networks:
      - app_net

  # --- Evolution API ---
  evolution_api:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-hogar_evolution_key_2026}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080

      # Database - PostgreSQL obrigatorio na Evolution API v2+
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution_pass_2026@evolution_postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api

      # Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution_redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_TTL: 604800

      DEL_INSTANCE: "false"
      DEL_TEMP_INSTANCES: "false"

      WEBHOOK_GLOBAL_ENABLED: "false"

      LOG_LEVEL: DEBUG
      LOG_COLOR: "true"
      CONFIG_SESSION_PHONE_CLIENT: ${CONFIG_SESSION_PHONE_CLIENT:-Chrome}
      CONFIG_SESSION_PHONE_NAME: ${CONFIG_SESSION_PHONE_NAME:-Chrome}
      CONFIG_SESSION_PHONE_VERSION: ${CONFIG_SESSION_PHONE_VERSION}
      QRCODE_LIMIT: ${QRCODE_LIMIT:-30}
      QRCODE_COLOR: ${QRCODE_COLOR:-#175197}

    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - app_net
    depends_on:
      - evolution_redis
      - evolution_postgres

  # --- PostgreSQL (banco da Evolution API) ---
  evolution_postgres:
    image: postgres:16-alpine
    container_name: evolution_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_pass_2026
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    networks:
      - app_net

  # --- Redis (cache de sessoes Evolution) ---
  evolution_redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data
    networks:
      - app_net

volumes:
  n8n_data:
  evolution_instances:
  evolution_store:
  evolution_redis_data:
  evolution_pgdata:

networks:
  app_net:
    driver: bridge
